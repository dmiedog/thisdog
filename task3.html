<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="5;url=https://github.com/SteamDoge/assignment3" />
  <title>Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
      color: #333;
    }

    .container {
      background: #fff;
      padding: 40px 60px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #222;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 12px;
    }

    .countdown {
      font-weight: bold;
      color: #007acc;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #007acc;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.3s;
    }

    .button:hover {
      background-color: #005f99;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>页面跳转中 / Redirecting...</h1>
    <p>你将在 <span class="countdown" id="count">5</span> 秒后跳转到 assignment3 页面。</p>
    <p>You will be redirected to the assignment3 page in <span class="countdown" id="count-en">5</span> seconds.</p>
    <a href="https://github.com/SteamDoge/assignment3" class="button">立即跳转 / Go Now</a>
  </div>

  <script>
    let count = 5;
    const cn = document.getElementById("count");
    const en = document.getElementById("count-en");
    const timer = setInterval(() => {
      count--;
      cn.textContent = count;
      en.textContent = count;
      if (count <= 0) {
        clearInterval(timer);
      }
    }, 1000);
  </script>
</body>
</html>
